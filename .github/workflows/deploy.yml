name: Deploy Client to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Next.js Client
    runs-on: ubuntu-latest
    environment: NEXTAUTH_SECRET

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$PATH:/usr/local/bin:/usr/bin"

            cd /var/www/casadimoda-client
            git checkout -- package-lock.json
            git pull origin main

            echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" > .env.production
            echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env.production
            echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env.production

            npm ci
            npm run build
            pm2 restart casadimoda-client --update-env
            pm2 save
