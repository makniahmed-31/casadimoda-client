name: Deploy Client to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Next.js Client
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/casadimoda-client
            git pull origin main
            npm ci
            npm run build
            pm2 restart casadimoda-client --update-env
            pm2 save
